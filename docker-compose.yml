services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-plateflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plateflow_secret}
      POSTGRES_DB: ${POSTGRES_DB:-plateflow}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plateflow}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8005:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  admin:
    build:
      context: ./admin
      dockerfile: docker/Dockerfile
    ports:
      - "3005:3005"
    volumes:
      - ./admin/src:/app/src
      - ./admin/public:/app/public
    environment:
      - VITE_API_BASE_URL=http://localhost:8005
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 3005

volumes:
  postgres_data:
